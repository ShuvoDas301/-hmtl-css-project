<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn This Site</title>
  <style>
    body {
      background-color: skyblue;
      margin: 0;
      font-family: Arial, sans-serif;
      padding-top: 120px;
    }

    /* Header - same as original (with flex) */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: #003366;
      color: white;
      z-index: 1000;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 32px;
      margin: 0;
      flex-shrink: 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    li a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: color 0.3s ease;
      font-size: 16px;
      white-space: nowrap;
    }

    li a:hover {
      color: yellow;
    }

    .institute-banner {
      background-color: #0055cc;
      color: white;
      padding: 30px;
      text-align: center;
      font-size: 30px;
      margin: 20px;
      border-radius: 6px;
    }

    .services-area {
      background-color: #fffacc;
      margin: 20px;
      padding: 20px;
      border-radius: 6px;
    }

    .services-area h2 
    
      font-size: 24px;
      margin-bottom: 10px;
    }

    .services-area ul {
      padding-left: 20px;
    }

    .services-area li {
      margin-bottom: 8px;
      font-weight: bold;
    }

    .signin-container {
      background-color: white;
      margin: 20px;
      padding: 20px;
      border-radius: 6px;
    }

    .signin-container h1 {
      font-size: 20px;
      color: #008080;
    }

    .signin-container input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    .signin-container button {
      width: 100%;
      padding: 12px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .signin-container button:hover {
      background-color: #1669c1;
    }

  </style>
</head>
<body>

  <header>
    <h1>WELCOME TO MY WEBSITE</h1>
    <ul>

      <li><a href="#">SERVICES</a></li>
      <li><a href="#">OTHERS</a></li>
      <li><a href="#">CONTACT</a></li>
    </ul>
  </header>

  <div class="institute-banner">
    DESH IT TRAINING INSTITUTE
  </div>

  <div class="services-area">
    <h2>OUR SERVICES</h2>
    <ul>
      <li>Office Management</li>
      <li>Web Design</li>
      <li>Graphic Design</li>
      <li>Video Editing</li>
      <li>Automation</li>
    </ul>
  </div>

  <div class="signin-container">
    <h1>Sign in</h1>
    <form>
      <input type="email" placeholder="Enter your email" required />
      <button type="submit">Next</button>
    </form>
<nav>

</nav>

</body>
</html>
